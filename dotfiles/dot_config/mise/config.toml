# mise global tool configuration
# Reference: https://mise.jdx.dev/configuration.html

[tools]
# bleeding-edge tools (no crates.io / nixpkgs entry yet)
# Note: the "ubi:" backend is deprecated since mise 2026.x and will be removed in 2027.1.0
# Use the unified "github:" backend instead.
"github:Helvesec/rmux" = "latest"
"github:oguna/rustmigemo" = "latest"

# CLI utilities (Wave 1: migrated from home-manager 2026-05-30)
"github:BurntSushi/ripgrep" = "latest"
"github:sharkdp/fd" = "latest"
"github:sharkdp/bat" = "latest"
"github:eza-community/eza" = "latest"
"github:ajeetdsouza/zoxide" = "latest"
"github:junegunn/fzf" = "latest"
"github:sxyazi/yazi" = "latest"
"github:jqlang/jq" = "latest"
# yq: GitHub release binary is named yq_linux_amd64; use mise's built-in registry to resolve this automatically
yq = "latest"

# git ecosystem (Wave 2: migrated from home-manager 2026-05-30)
"github:x-motemen/ghq" = "latest"
"github:cli/cli" = "latest"
"github:jesseduffield/lazygit" = "latest"

# Editor (Wave 3: migrated from home-manager 2026-05-30)
# neovim publishes official linux tarball at github releases
"github:neovim/neovim" = "latest"

# Language runtimes (Wave 4: aqua backend 経由)
# core:node (mise 2026.5.6) は source build + panic クラッシュのバグを持つため不使用。
# aqua backend は nodejs.org の prebuilt binary を取得する。
# 注意: tarball が node-vX.Y.Z-linux-x64/ サブディレクトリ込みで展開されるため、bin_paths で明示
"aqua:nodejs/node" = { version = "22", bin_paths = ["node-v{{version}}-linux-x64/bin"] }

[settings]
# Enable idiomatic version files (.tool-versions, .python-version, etc.)
idiomatic_version_file_enable_tools = ["python", "node"]
