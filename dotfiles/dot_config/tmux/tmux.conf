# =====================================================================
# tmux configuration
# Location: ~/.config/tmux/tmux.conf (XDG, tmux 3.1+)
# Compatible target: tmux 3.x and rmux (tmux-compatible Rust impl)
# =====================================================================

# ---------- Prefix key ----------
# Change prefix from C-b to C-a (screen-compatible)
unbind C-b
set -g prefix C-a
bind C-a send-prefix    # Pass-through: press C-a twice to send a literal C-a

# ---------- General ----------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,*256col*:Tc"
set -sg escape-time 10         # Reduce escape latency (helps Neovim)
set -g history-limit 10000
set -g focus-events on         # Forward focus events (Neovim autoread)
set -g base-index 1            # Windows start at 1, not 0
setw -g pane-base-index 1
set -g renumber-windows on     # Renumber when a window is closed

# ---------- Mouse ----------
set -g mouse on

# ---------- Copy mode: vi keybindings ----------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ---------- Pane management ----------
# Split using | and - (intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Move between panes with Alt + arrow (no prefix)
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Resize panes with prefix + H/J/K/L
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ---------- Window management ----------
# New window opens in the current directory
bind c new-window -c "#{pane_current_path}"

# ---------- Reload config ----------
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/tmux.conf"

# ---------- Status bar ----------
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=white"
set -g status-left-length 30
set -g status-left "#[fg=green][#S] "
set -g status-right "#[fg=cyan]%Y-%m-%d %H:%M "
set -g window-status-format " #I:#W "
set -g window-status-current-format "#[fg=black,bg=green] #I:#W "

# ---------- Activity ----------
setw -g monitor-activity on
set -g visual-activity off
