# =====================================================================
# tmux configuration
# Location: ~/.config/tmux/tmux.conf (XDG, tmux 3.1+)
# Compatible target: tmux 3.x and rmux (tmux-compatible Rust impl)
# =====================================================================

# ---------- Prefix key ----------
# Change prefix from C-b to C-a (screen-compatible)
unbind C-b
set -g prefix C-a
bind C-a send-prefix    # Pass-through: press C-a twice to send a literal C-a

# ---------- General ----------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,*256col*:Tc"
set -sg escape-time 10         # Reduce escape latency (helps Neovim)
set -g history-limit 10000
set -g focus-events on         # Forward focus events (Neovim autoread)
set -g base-index 1            # Windows start at 1, not 0
setw -g pane-base-index 1
set -g renumber-windows on     # Renumber when a window is closed

# ---------- Mouse ----------
set -g mouse on

# ---------- Copy mode: vi keybindings ----------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# ---------- Pane management ----------
# Split (現在のパスを維持)。s=下(-v) / v=右(-h)。| - も同義で残す。
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Pane navigation: Ctrl+hjkl (nvim の smart-splits.nvim と統一)。
# is_vim 判定で nvim ペイン内なら Ctrl-hjkl を nvim へ委譲、それ以外は select-pane。端では停止。
# ※ nvim 側 smart-splits.nvim (multiplexer_integration="tmux") とペアで完成する。
#   nvim 設定は別プランで移植予定。それまでシェルペイン間移動として機能する。
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind -n C-h if-shell "$is_vim" 'send-keys C-h' "if -F '#{pane_at_left}'   '' 'select-pane -L'"
bind -n C-j if-shell "$is_vim" 'send-keys C-j' "if -F '#{pane_at_bottom}' '' 'select-pane -D'"
bind -n C-k if-shell "$is_vim" 'send-keys C-k' "if -F '#{pane_at_top}'    '' 'select-pane -U'"
bind -n C-l if-shell "$is_vim" 'send-keys C-l' "if -F '#{pane_at_right}'  '' 'select-pane -R'"
# Ctrl-l をナビに使うため、画面クリアは prefix + Ctrl-l に退避
bind C-l send-keys 'C-l'

# Pane resize: Alt+hjkl (nvim smart-splits.nvim のリサイズキーと統一、prefix 不要)
bind -n M-h resize-pane -L 2
bind -n M-j resize-pane -D 2
bind -n M-k resize-pane -U 2
bind -n M-l resize-pane -R 2

# Pane zoom: M=拡大のみ / m=解除のみ (tmux ネイティブ zoom + window_zoomed_flag)。
# 分割/移動時はネイティブ zoom が自動解除するので追加ロジック不要。
bind M if -F '#{window_zoomed_flag}' '' 'resize-pane -Z'
bind m if -F '#{window_zoomed_flag}' 'resize-pane -Z' ''

# Pane swap: prefix + hjkl でアクティブペインを隣と位置入れ替え (方向指定・フォーカス追従)。
# 修飾子で動詞が決まる体系: Ctrl-hjkl=移動 / Alt-hjkl=リサイズ / prefix→hjkl=スワップ。
# -r で repeat 可 (prefix 後に h h h と連続スワップできて軽快)。
# {*-of} は tmux 3.1+ の方向ターゲット。rmux が未対応の場合は rmux 下でのみ無効。
bind -r h swap-pane -d -t '{left-of}'  \; select-pane -L
bind -r j swap-pane -d -t '{down-of}'  \; select-pane -D
bind -r k swap-pane -d -t '{up-of}'    \; select-pane -U
bind -r l swap-pane -d -t '{right-of}' \; select-pane -R

# ---------- IME: ペイン移動で fcitx5 を無効化 ----------
# after-select-pane = select-pane 実行直後に発火。Ctrl-hjkl のペイン移動も smart-splits の
# nvim→tmux 越境も内部で select-pane を呼ぶため、全 tmux ペイン移動を捕捉できる。
# shell ペインは InsertLeave が無く IME が残り得るのを塞ぐ (nvim split 内移動は nvim 側 InsertLeave が担う)。
# fcitx5-remote が無い環境では no-op (可搬性)。
set-hook -g after-select-pane 'run-shell -b "command -v fcitx5-remote >/dev/null 2>&1 && fcitx5-remote -c"'

# ---------- Window management ----------
# New window opens in the current directory
bind c new-window -c "#{pane_current_path}"

# ---------- Sessionizer (prefix + f) ----------
# fzf でプロジェクト(ghq list)を選び session 作成/切替。tpm 不使用の素のスクリプト。
# run-shell は /bin/sh 実行で zshrc の PATH が効かないため ~/.local/bin をフルパス指定。
bind f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# ---------- Floating scratch pane (display-popup, tmux 3.2+) ----------
# prefix + p: 中央に浮く永続 scratch セッションをトグル (tmux ネイティブの floating)。
# 仕組み: popup が開いている間キーは内側 scratch クライアントが処理するため、外側からは閉じられない。
#   そこで session_name が "scratch" か(=popup の中か)で分岐し、同一キーで開閉トグルにする:
#   - 中 (session_name=scratch) → detach-client で閉じる (scratch 自体は残り中身を保持)
#   - 外                         → display-popup で開く (new-session -A: あれば attach/無ければ作成)
# ※ wezterm 不要 (tmux 中心の住み分けを維持)。rmux が display-popup 未対応なら rmux 下では無効。
# (prefix p は tmux 既定 previous-window を上書き)
bind p if-shell -F '#{==:#{session_name},scratch}' 'detach-client' \
  'display-popup -E -w 80% -h 80% "tmux new-session -A -s scratch"'

# ---------- Reload config ----------
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded ~/.config/tmux/tmux.conf"

# ---------- Status bar ----------
# 配色は starship(cyan時刻 / blue) と統一。視線左寄りの習慣に合わせ日時を左端へ集約。
# tokyonight-storm パレット (cyan=#7dcfff, blue=#7aa2f7, fg=#a9b1d6, dim=#565f89, bg=#1a1b26)。
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=#a9b1d6"
set -g status-left-length 40
set -g status-left "#[fg=#7dcfff]%m/%d %H:%M #[fg=#7aa2f7][#S] "
set -g status-right ""
set -g window-status-format "#[fg=#565f89] #I:#W "
set -g window-status-current-format "#[fg=#1a1b26,bg=#7aa2f7,bold] #I:#W "

# ---------- Activity ----------
setw -g monitor-activity on
set -g visual-activity off

# ---------- Plugins (TPM 不使用; Nix 取得 + 安定 symlink を run-shell) ----------
# プラグイン本体は home-manager が ~/.config/tmux/plugins/{jump,thumbs} へ symlink (Nix store)。
# ここでは設定 (キー割当 + run-shell 配線) のみ担う。Nix=依存 / chezmoi=設定 の分担。
#
# tmux-jump  (prefix + J): 画面上の任意文字へラベルジャンプ。flash.nvim の tmux レイヤー対応物。
#   ※ flash は nvim バッファ内専用で別ペインには届かない (extmark 層)。tmux 画面全体は
#      capture-pane 上で動く jump が担当する (層が違うので別エンジン)。
#   ※ デフォルト prefix+j は swap-pane と衝突するため J (大文字) に退避。
# tmux-thumbs (prefix + Space): 画面上のパス/URL/hash をラベル選択してコピー。
#   ※ prefix+Space は tmux デフォルト next-layout を上書き (実害なし)。
set -g @jump-key 'J'
set -g @thumbs-key 'Space'
run-shell ~/.config/tmux/plugins/jump/tmux-jump.tmux
run-shell ~/.config/tmux/plugins/thumbs/tmux-thumbs.tmux
